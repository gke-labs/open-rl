apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-rl-trainer-worker
  labels:
    app: open-rl-trainer-worker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: open-rl-trainer-worker
  template:
    metadata:
      labels:
        app: open-rl-trainer-worker
    spec:
      serviceAccountName: open-rl-sa
      containers:
      - name: trainer-worker
        image: gcr.io/cdrollouts-sunilarora/open-rl-server:latest
        imagePullPolicy: Always
        command: ["uv", "run", "python", "-m", "src.clock_cycle"]
        env:
        - name: ENABLE_GCP_TRACE
          value: "1"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        - name: BASE_MODEL
          value: "Qwen/Qwen3-4B-Instruct-2507"
        - name: OPEN_RL_TMP_DIR
          value: "/mnt/lustre/open-rl"
        - name: HF_HOME
          value: "/mnt/lustre/open-rl/huggingface"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 30 # Give it 5 minutes total to load the massive tensors from Lustre
        resources:
          limits:
            nvidia.com/gpu: "1"
            memory: "32Gi"
          requests:
            nvidia.com/gpu: "1"
            memory: "32Gi"
            cpu: "2"
        volumeMounts:
        - name: lustre-storage
          mountPath: /mnt/lustre
      volumes:
      - name: lustre-storage
        persistentVolumeClaim:
          claimName: open-rl-lustre-pvc
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
